<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUCK Store | Sign Up</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
    <main class="page-center">
        <article class="auth-split">
            <section class="auth-left">
                <div class="auth-left-content">
                    <h2 class="auth-title-large">DUCK your <br> literary journey.</h2>
                    <p>Access the world's most prestigious collection of digital manuscripts.</p>
                </div>
            </section>

            <section class="auth-right">
                <header class="m-bottom-lg">
                    <h1>Create your account</h1>
                    <p class="text-muted">Join our elite community of readers.</p>
                </header>

                <form class="form" action="home.html" id="signup_form">
                    <button type="button" class="btn btn-outline">
                        <i class="bi bi-google"></i> Continue with Google
                    </button>
                    
                    <div class="divider">OR</div>
                    
                    <div class="form-field">
                        <label class="form-label">Full Name</label>
                        <div class="input-group">
                            <i class="bi bi-person input-icon"></i>
                            <input class="form-input" type="text" placeholder="John Doe" required>
                        </div>
                    </div>
                    
                    <div class="form-field">
                        <label class="form-label">Email Address</label>
                        <div class="input-group">
                            <i class="bi bi-envelope input-icon"></i>
                            <input class="form-input" type="email" placeholder="name@example.com" required>
                        </div>
                    </div>

                    <div class="form-field">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <i class="bi bi-lock input-icon"></i>
                            <input class="form-input" type="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="admin_toggle" class="checkbox-custom">
                        <label for="admin_toggle" class="form-label">Sign up as Administrator</label>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="terms" class="checkbox-custom" required>
                        <label for="terms" class="text-muted">I agree to the Terms & Privacy</label>
                    </div>

                    <button type="submit" class="btn btn-primary">Create Account</button>
                </form>

                <footer class="auth-footer-nav">
                    <p class="text-muted">Already have an account? <a href="sign_in.html" class="link-accent-yellow">Log in</a></p>
                </footer>
            </section>
        </article>
    </main>

    <script>
        window.onload = function() {
            const signupForm = document.getElementById('signup_form');
            const adminCheckbox = document.getElementById('admin_toggle');

            if (signupForm) {
                signupForm.addEventListener('submit', function(event) {
                    if (adminCheckbox && adminCheckbox.checked) {
                        event.preventDefault();
                        window.location.href = 'dashboard.html';
                    }
                });
            }
        };
    </script>
</body>
</html>
