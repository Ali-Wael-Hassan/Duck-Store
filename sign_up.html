<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duck Store - Sign Up</title>

    <link rel="stylesheet" href=""> <!-- Will be used later -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>

<header class="main-header">

    <section class="logo">
        <i class="bi bi-book-half"></i>
        <span>Duck Library</span>
    </section>

    <nav class="main-nav">
        <ul>
            <li><a href="/home.html">Home</a></li>
            <li><a href="/catalog.html">Catalog</a></li>
            <li><a href="/pricing.html">Pricing</a></li>
            <li><a href="/about.html">About</a></li>
        </ul>
    </nav>

    <section class="header-actions">
        <a href="sign_in.html" class="btn-signin">Sign In</a>
    </section>

</header>


<main class="signup-page">

    <section class="promo-section">

        <figure class="promo-image">
            <img src="" alt="Duck Library Illustration">
        </figure>

        <article class="promo-text">

            <h2 class="small-heading">
                <small>
                    <i class="bi bi-book-half"></i>
                    DUCK Books
                </small>
            </h2>

            <h1>
                Duck your <br>
                literary journey
            </h1>

            <p>
                Access the world's most prestigious collection of
                digital manuscripts and rare editions
            </p>

        </article>

    </section>


    <section class="signup-section">

        <section class="social-signup">
            <a href="google-auth" class="google-btn">
                <i class="bi bi-google"></i>
                Continue with Google
            </a>
        </section>

        <section class="divider">
            <hr>
            <span>OR</span>
            <hr>
        </section>


        <form action="" method="post" class="signup-form">

            <fieldset class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text"
                       id="full_name"
                       name="user_name"
                       placeholder="7amaza"
                       required>
            </fieldset>

            <fieldset class="form-group">
                <label for="email">Email Address</label>
                <input type="email"
                       id="email"
                       name="user_email"
                       placeholder="name@example.com"
                       required>
            </fieldset>

            <fieldset class="form-group">
                <label for="password">Password</label>
                <input type="password"
                       id="password"
                       name="user_password"
                       required>
            </fieldset>

            <fieldset class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password"
                       id="confirm_password"
                       name="user_confirm_password"
                       required>
            </fieldset>


            <section class="password-strength">

                <header class="strength-header">
                    <span>Security Strength</span>
                    <span class="strength-level">Strong</span>
                </header>

                <section class="strength-bars">
                    <hr>
                    <hr>
                    <hr>
                    <hr>
                </section>

            </section>


            <section class="terms-group">
                <input type="checkbox" id="agree" name="user_agree" required>

                <label for="agree">
                    I agree to the
                    <span>Terms of Service</span>
                    and
                    <span>Privacy Policy</span>
                </label>
            </section>


            <section class="submit-group">
                <button type="submit" class="submit-btn">
                    Create Account
                </button>
            </section>

        </form>

    </section>

</main>

</body>
</html>
