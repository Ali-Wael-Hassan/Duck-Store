<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUCK Store | Sign In</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <script>
        window.onload = function() {
            const loginForm = document.getElementById('login_form'); 
            const adminCheckbox = document.getElementById('admin_toggle');

            if (loginForm) {
                loginForm.addEventListener('submit', function(event) {
                    if (adminCheckbox && adminCheckbox.checked) {
                        event.preventDefault(); 
                        window.location.href = 'dashboard.html'; 
                    }
                });
            }
        };
    </script>
</head>
<body>
    <main class="page-center">
        <header class="text-center m-bottom-lg">
            <h1 class="brand-logo">DUCK <span class="text-accent">STORE</span></h1>
            <p class="text-muted">Step into a world of curated wisdom</p>
        </header>

        <section class="card">
            <header class="card-header-accent m-bottom-lg">
                <h2>Welcome Back</h2>
                <p class="text-accent">Access your premium digital library</p>
            </header>

            <form id="login_form" action="home.html" method="post" class="form">
                <div class="form-field">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                        <i class="bi bi-envelope input-icon"></i>
                        <input class="form-input" type="email" placeholder="name@example.com" required>
                    </div>
                </div>

                <div class="form-field">
                    <div class="form-row-space">
                        <label class="form-label">Password</label>
                        <a href="#" class="link-accent">Forgot password?</a>
                    </div>
                    <div class="input-group">
                        <i class="bi bi-lock input-icon"></i>
                        <input class="form-input" type="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="banner-security">
                    <i class="bi bi-shield-check"></i>
                    <div>
                        <p class="banner-security-title">2FA Security Active</p>
                        <p class="banner-security-text">Verification required upon login.</p>
                    </div>
                </div>

                <div class="form-field-checkbox">
                    <input type="checkbox" id="admin_toggle">
                    <label for="admin_toggle" class="form-label">Login as Administrator</label>
                </div>

                <button type="submit" class="btn btn-primary">Sign Into Library</button>

                <div class="divider">OR CONTINUE WITH</div>

                <button type="button" class="btn btn-outline">
                    <i class="bi bi-google"></i> Continue with Google
                </button>
            </form>

            <footer class="auth-footer-nav">
                <p class="text-muted">Don't have an account? <a href="sign_up.html" class="link-accent">Request Invitation</a></p>
            </footer>
        </section>
    </main>
</body>
</html>
