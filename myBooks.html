<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUCK Store | My Books</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">DUCK Books</div>
        <ul class="nav-links">
            <li><a href="home.html">HOME</a></li>
            <li><a href="store.html">STORE</a></li>
            <li><a href="myBooks.html">MYBOOKS</a></li>
            <li><a href="community.html">COMMUNITY</a></li>
            <li><a href="reward.html">REWARDS</a></li>
            <li>
                <form class="search-bar">
                    <input type="text" placeholder="Search titles, authors..." name="search">
                </form>
            </li>
            <li><button id="notification_button">notifications</button></li>
            <li><button id="settings_button">Settings</button></li>
            <li><a href="user_profile.html">PROFILE</a></li>
        </ul>
    </nav>

    <main>
        <header class="library-header">
            <h1>My Books</h1>
            <div class="header-controls">
                <span>Manage your active rentals and personal digital collection</span>
                <button type="button">
                    <i class="fas fa-plus"></i> Add Book
                </button>
            </div>
        </header>

        <hr>

        <section class="book-grid">
            
            <article class="card-item">
                <div class="badge rental-badge">
                    <i class="fas fa-clock"></i> RENTAL
                </div>
                
                <div class="book-cover">
                    <img src="https://m.media-amazon.com/images/I/81GeS62181L.jpg" alt="1984 Cover">
                </div>

                <div class="book-info">
                    <h3>1984</h3>
                    <p class="author">George Orwell</p>
                </div>

                <div class="progress-container">
                    <div class="progress-text">
                        <span><strong>65%</strong> COMPLETED</span>
                        <span>5 days left</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-fill"></div>
                    </div>
                </div>

                <div class="card-actions">
                    <button>Read Now</button>
                    <button class="secondary">Return</button>
                </div>
            </article>

            <article class="card-item">
                <div class="badge owned-badge">
                    <i class="fas fa-check-circle"></i> OWNED
                </div>
                
                <div class="book-cover">
                    <img src="" alt="Dune Cover">
                </div>

                <div class="book-info">
                    <h3>Dune</h3>
                    <p class="author">Frank Herbert</p>
                </div>

                <div class="progress-container">
                    <div class="progress-text">
                        <span><strong>10%</strong> COMPLETED</span>
                        <span>Lifetime Access</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-fill"></div>
                    </div>
                </div>

                <div class="card-actions">
                    <button>Continue Reading</button>
                </div>
            </article>

        </section>
    </main>

</body>
</html>
