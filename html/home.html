<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse | Duck Store</title>
    <link rel="stylesheet" href="../css/classes.css">
    <link rel="stylesheet" href="../css/component.css">
    <link rel="stylesheet" href="../css/Pages/home-page.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&display=swap" rel="stylesheet">
</head>

<body data-page="browse"> 
    <nav class="header">
        <div class="container header__inner">
            <div class="logo-group">
                <div class="logo-icon">
                    <span class="material-symbols-outlined" aria-hidden="true">menu_book</span>
                </div>
                <div class="logo-text">LUMINA</div>
            </div>
            
            <div class="nav" aria-label="Main navigation">
                <a href="home.html">Home</a>
                <a href="store.html" class="active">Store</a>
                <a href="my-books.html">My Books</a>
                <a href="community.html">Community</a>
                <a href="reward.html">Rewards</a>
            </div>

            <div class="header__actions">
                <a href="cart.html" class="action-link" aria-label="Shopping Cart">
                    <span class="material-symbols-outlined" aria-hidden="true">shopping_cart</span>
                    </a>
                <a href="profile.html" class="action-link" aria-label="User Profile">
                    <span class="material-symbols-outlined" aria-hidden="true">account_circle</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="dashboard-container">
        <section class="featured-section">
            <header class="section-header">
                <h2>Featured Subscriptions</h2>
                <div class="carousel-controls">
                    <button class="prev-btn">❮</button>
                    <button class="next-btn">❯</button>
                </div>
            </header>
            <div class="featured-grid"></div> 
        </section>

        <section class="trending-section">
            <header class="section-header">
                <h2>Trending Books</h2>
                <a href="#" class="view-all">View All</a>
            </header>
            <div class="books-grid"></div>
        </section>

        <section class="curated-section">
            <header class="section-header">
                <h2>Curated For You</h2>
                <a href="#" class="view-all">See recommendations</a>
            </header>
            <div class="curated-grid"></div>
        </section>
    </main>

    <script type="module" src="../js/main.js"></script>
</body>

</html>
