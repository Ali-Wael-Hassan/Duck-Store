<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        if (window.location.hostname.includes('github.io')) {
            const base = document.createElement('base');
            base.href = '/Duck-Store/'; 
            document.head.appendChild(base);
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duck Library | Community Leaderboard</title>
    
    <link rel="stylesheet" href="css/component.css">
    <link rel="stylesheet" href="css/classes.css">
    <link rel="stylesheet" href="css/Pages/community.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&display=swap" rel="stylesheet">
</head>
<body data-page="community">
    
    <nav class="header" id="main-nav">
        <div class="container header__inner">
            <div class="logo-group">
                <div class="logo-icon"><span class="material-symbols-outlined">menu_book</span></div>
                <div class="logo-text">DUCK</div>
            </div>
            <div class="nav">
                <a href="home.html">Home</a>
                <a href="store.html">Store</a>
                <a href="my-Books.html">My Books</a>
                <a href="community.html" class="active">Community</a>
                <a href="reward.html">Rewards</a>
            </div>
            <div class="header__actions">
                <a href="user_profile.html" class="avatar-link"><img src="#" class="avatar-img"></a>
            </div>
        </div>
    </nav>

    <div class="layout-wrapper">

        <main class="leaderboard-main">
            <header class="leaderboard-header">
                <div class="leaderboard-header__tag">
                    <i class="bi bi-trophy-fill"></i> GLOBAL RANKING
                </div>
                <h1 class="leaderboard-header__title">Community Leaderboard</h1>
                <p class="leaderboard-header__subtitle">Recognizing our most dedicated scholars, readers, and knowledge contributors.</p>
            </header>

            <section class="podium" id="podium-container">
                <div class="loading-spinner">Calculating Rankings...</div>
            </section>

            <section class="scholars-section">
                <header class="scholars-section__header">
                    <h2>Top Scholars</h2>
                </header>
                <div class="scholars-table-wrapper">
                    <table class="scholars-table">
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Scholar</th>
                                <th>Readings</th>
                                <th>Reviews</th>
                                <th>Points</th>
                            </tr>
                        </thead>
                        <tbody id="scholars-table-body">
                        </tbody>
                    </table>
                </div>
            </section>

            <section class="stats-grid" id="stats-container">
            </section>
        </main>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
