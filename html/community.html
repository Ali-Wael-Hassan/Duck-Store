<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Books | Community Leaderboard</title>
    
    <link rel="stylesheet" href="../css/component.css">
    <link rel="stylesheet" href="../css/classes.css">
    <link rel="stylesheet" href="../css/Pages/community.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&display=swap" rel="stylesheet">
</head>
<body data-page="community">
    
    <nav class="main-nav">
        <div class="main-nav__logo">Lumina Books</div>
        <ul class="main-nav__links">
            <li><a href="home.html">HOME</a></li>
            <li><a href="store.html">STORE</a></li>
            <li><a href="myBooks.html">MY BOOKS</a></li>
            <li><a href="community.html" class="active">COMMUNITY</a></li>
            <li><a href="reward.html">REWARDS</a></li>
            <li>
                <form class="search-form" role="search" onsubmit="return false;">
                    <input type="text" placeholder="Search scholars..." id="scholar-search" aria-label="Search scholars">
                </form>
            </li>
            <li><button id="notification-btn" class="icon-btn"><span class="material-symbols-outlined">notifications</span></button></li>
            <li><a href="user_profile.html" class="profile-link">PROFILE</a></li>
        </ul>
    </nav>

    <main class="leaderboard-main">
        <header class="leaderboard-header">
            <div class="leaderboard-header__tag">
                <i class="bi bi-trophy-fill"></i> GLOBAL RANKING
            </div>
            <h1 class="leaderboard-header__title">Community Leaderboard</h1>
            <p class="leaderboard-header__subtitle">Recognizing our most dedicated scholars, readers, and knowledge contributors.</p>
        </header>

        <section class="podium" id="podium-container">
            <div class="loading-spinner">Calculating Rankings...</div>
        </section>

        <section class="scholars-section">
            <header class="scholars-section__header">
                <h2>Top Scholars</h2>
            </header>
            <div class="scholars-table-wrapper">
                <table class="scholars-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Scholar</th>
                            <th>Readings</th>
                            <th>Reviews</th>
                            <th>Points</th>
                        </tr>
                    </thead>
                    <tbody id="scholars-table-body">
                        </tbody>
                </table>
            </div>
        </section>

        <section class="stats-grid" id="stats-container">
            </section>
    </main>

    <script type="module" src="../js/main.js"></script>
</body>
</html>
