<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Books | View Book</title>
    <link rel="stylesheet" href="../css/component.css">
    <link rel="stylesheet" href="../css/classes.css">
    <link rel="stylesheet" href="../css/Pages/book_view.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&display=swap" rel="stylesheet">
</head>
<body data-page="book-view"> 
    <nav class="header">
        <div class="container header__inner">
            <div class="logo-group">
                <div class="logo-icon">
                    <span class="material-symbols-outlined" aria-hidden="true">menu_book</span>
                </div>
                <div class="logo-text">LUMINA</div>
            </div>
            
            <div class="nav" aria-label="Main navigation">
                <a href="home.html">Home</a>
                <a href="store.html" class="active">Store</a>
                <a href="my-books.html">My Books</a>
                <a href="community.html">Community</a>
                <a href="reward.html">Rewards</a>
            </div>

            <div class="header__actions">
                <a href="cart.html" class="action-link" aria-label="Shopping Cart">
                    <span class="material-symbols-outlined">shopping_cart</span>
                </a>
                <a href="user_profile.html" class="avatar-link" aria-label="User Profile">
                    <img src="https://via.placeholder.com/32" alt="User avatar" class="avatar-img">
                </a>
            </div>
        </div>
    </nav>

    <main>
        <section class="left">
            <div id="book-cover-container" class="placeholder-img">
                <p>LOADING...</p>
            </div>
            <div class="actions">
                <button id="buyButton" class="btn-primary" onclick="bookPage.handleAction(this, 'userBooks')">
                    BUY
                </button>
                <button id="borrowButton" class="btn-secondary" onclick="bookPage.handleAction(this, 'borrowedBooks')">
                    BORROW
                </button>
            </div>
        </section>

        <section class="right">
            <div class="head">
                <h1 id="book-title">Loading...</h1>
                <p class="author-line">
                    <strong id="book-author">---</strong> •
                    <span id="star-rating-container" class="stars"></span>
                    <span id="book-rating">0.0</span>
                </p>
            </div>

            <div class="meta-container">
                <div class="meta-box"><span>PAGES</span><strong id="meta-pages">---</strong></div>
                <div class="meta-box"><span>FORMAT</span><strong id="meta-format">Digital</strong></div>
                <div class="meta-box"><span>LANGUAGE</span><strong id="meta-lang">English</strong></div>
                <div class="meta-box"><span>PUBLISHED</span><strong id="meta-date">---</strong></div>
            </div>

            <article class="description">
                <h2>Synopsis</h2>
                <p>
                    <span id="synopsis-content">Loading summary...</span>
                    <span id="extra-content" class="hidden"></span> 
                </p>
                <button id="readMoreBtn" class="read-more-link" onclick="bookPage.toggleSynopsis('readMoreBtn', 'extra-content')">
                    Read more →
                </button>
            </article>

            <hr class="section-divider">

            <div class="reviews">
                <div class="reviews-header">
                    <h3>Reader Reviews</h3>
                    <button class="btn-secondary write-review-btn" onclick="bookPage.handleAddReview()">
                        <i class="bi bi-pencil-square"></i> Write a Review
                    </button>
                </div>
                <div id="review-list"></div>
                <button class="btn-secondary load-more" onclick="bookPage.handleLoadMore(this)">
                    Load more reviews
                </button>
            </div>
        </section>
    </main>

    <script type="module" src="../js/main.js"></script>
</body>
</html>
