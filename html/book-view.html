<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Books | View Book</title>
    <link rel="stylesheet" href="../css/component.css">
    <link rel="stylesheet" href="../css/classes.css">
    <link rel="stylesheet" href="../css/Pages/book_view.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body data-page="book-view"> 
    <nav class="main-nav">
        <div class="logo">Lumina Books</div>
        <ul class="nav-links">
            <li><a href="dashboard.html">BROWSE</a></li>
            <li><a href="store.html">STORE</a></li>
            <li><a href="user_profile.html">MYBOOKS</a></li>
        </ul>
        <form class="search-bar">
            <input type="text" placeholder="Search...">
        </form>
    </nav>

    <main>
        <section class="left">
            <div id="book-cover-container" class="placeholder-img">
                <p>LOADING...</p>
            </div>
            <div class="actions">
                <button id="buyButton" class="btn-primary" onclick="bookPage.handleAction(this, 'userBooks')">
                    BUY
                </button>
                <button id="borrowButton" class="btn-secondary" onclick="bookPage.handleAction(this, 'borrowedBooks')">
                    BORROW
                </button>
            </div>
        </section>

        <section class="right">
            <div class="head">
                <h1 id="book-title">Loading...</h1>
                <p class="author-line">
                    <strong id="book-author">---</strong> •
                    <span id="star-rating-container" class="stars"></span>
                    <span id="book-rating">0.0</span>
                </p>
            </div>

            <div class="meta-container">
                <div class="meta-box"><span>PAGES</span><strong id="meta-pages">---</strong></div>
                <div class="meta-box"><span>FORMAT</span><strong id="meta-format">Digital</strong></div>
                <div class="meta-box"><span>LANGUAGE</span><strong id="meta-lang">English</strong></div>
                <div class="meta-box"><span>PUBLISHED</span><strong id="meta-date">---</strong></div>
            </div>

            <article class="description">
                <h2>Synopsis</h2>
                <p>
                    <span id="synopsis-content">Loading summary...</span>
                    <span id="extra-content" class="hidden"></span> </p>
                <button id="readMoreBtn" class="read-more-link" onclick="bookPage.toggleSynopsis('readMoreBtn', 'extra-content')">
                    Read more →
                </button>
            </article>

            <hr class="section-divider">

            <div class="reviews">
                <div class="reviews-header">
                    <h3>Reader Reviews</h3>
                    <button class="btn-secondary write-review-btn" onclick="bookPage.handleAddReview()">
                        <i class="bi bi-pencil-square"></i> Write a Review
                    </button>
                </div>
                <div id="review-list"></div>
                <button class="btn-secondary load-more" onclick="bookPage.handleLoadMore(this)">
                    Load more reviews
                </button>
            </div>
        </section>
    </main>

    <script type="module" src="../js/main.js"></script>
</body>
</html>
