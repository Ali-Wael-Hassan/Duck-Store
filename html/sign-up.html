<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUCK Store | Sign Up</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/component.css">
    <link rel="stylesheet" href="../css/classes.css">
    <link rel="stylesheet" href="../css/Pages/sign-up.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    </head>
<body data-page="auth"> <main class="page-center">
        <article class="auth-split">
            <section class="auth-split__side auth-split__side-visual">
                <div class="auth-split__content">
                    <h2 class="auth-split__title-large">DUCK your <br> literary journey.</h2>
                    <p>Access the world's most prestigious collection of digital manuscripts.</p>
                </div>
            </section>

            <section class="auth-split__side auth-split__side-form">
                <header class="m-bottom-lg">
                    <h2 class="text-heading">Create your account</h2>
                    <p class="text-muted">Join our elite community of readers.</p>
                </header>

                <form id="signup-form" class="form-auth"> <button type="button" class="btn btn-outline" onclick="authPage.googleLogin()">
                        <i class="bi bi-google" aria-hidden="true"></i> 
                        <span>Continue with Google</span>
                    </button>
                    
                    <div class="divider">OR</div>
                    
                    <div class="form-auth__field">
                        <label class="form-auth__label" for="full-name">Full Name</label>
                        <div class="form-auth__input-group">
                            <i class="bi bi-person form-auth__icon" aria-hidden="true"></i>
                            <input id="full-name" class="form-auth__input" type="text" placeholder="John Doe" required>
                        </div>
                    </div>
                    
                    <div class="form-auth__field">
                        <label class="form-auth__label" for="email-input">Email Address</label>
                        <div class="form-auth__input-group">
                            <i class="bi bi-envelope form-auth__icon" aria-hidden="true"></i>
                            <input id="email-input" class="form-auth__input" type="email" placeholder="name@example.com" required>
                        </div>
                    </div>

                    <div class="form-auth__field">
                        <label class="form-auth__label" for="password-input">Password</label>
                        <div class="form-auth__input-group">
                            <i class="bi bi-lock form-auth__icon" aria-hidden="true"></i>
                            <input id="password-input" class="form-auth__input" type="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-auth__field-checkbox">
                        <input type="checkbox" id="admin-toggle">
                        <label for="admin-toggle" class="form-auth__label">Sign up as Administrator</label>
                    </div>

                    <div class="form-auth__field-checkbox">
                        <input type="checkbox" id="terms-agreement" required>
                        <label for="terms-agreement" class="text-muted">I agree to the Terms & Privacy</label>
                    </div>

                    <button type="submit" class="btn-primary">Create Account</button>
                </form>

                <footer class="auth-split__footer">
                    <p class="text-muted">Already have an account? <a href="../index.html" class="link-accent">Log in</a></p>
                </footer>
            </section>
        </article>
    </main>

    <script type="module" src="JS/main.js"></script>
</body>
</html>
