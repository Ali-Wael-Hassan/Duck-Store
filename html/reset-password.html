<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Duck Library | Reset Password</title>
    <link rel="stylesheet" href="../css/component.css">
    <link rel="stylesheet" href="../css/classes.css">
    <link rel="stylesheet" href="../css/Pages/reset.css">
    <script src="reset.js"></script>
</head>
<body>

    <main>
        <div class="brand-header">
            <div class="brand-icon" aria-hidden="true">✦</div>
            <span class="brand-text">Duck Library</span>
        </div>

        <section>
            <h1>Reset Your Password</h1>
            <p>Enter your email and we'll send you a link to get back into your account.</p>

            <form id="reset-form" method="post" novalidate>
                <label for="email-address">EMAIL ADDRESS</label>
                <input type="email"
                       id="email-address"
                       name="email"
                       placeholder="name@archive.com"
                       autocomplete="email"
                       aria-describedby="expiry-info"
                       required>

                <div id="expiry-info" class="expiry-note">
                    🔒 A SECURE RESET LINK WILL EXPIRE IN 24 HOURS FOR YOUR PROTECTION.
                </div>

                <button type="submit" id="reset-submit" class="btn-primary">
                    SEND RESET LINK
                </button>

                <div id="form-message" class="form-feedback" role="alert" aria-live="polite"></div>
            </form>

            <a href="../index.html" class="back-link" id="back-to-signin">
                ← Back to Sign In
            </a>
        </section>
    </main>

</body>
</html>
