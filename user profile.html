<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zalata</title>
    <link rel="stylesheet" href="user profile style.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">Zalata Books</div>
        <ul class="nav-links">
            <li><a href="">Library</a></li>
            <li><a href="">Store</a></li>
            <li><a href="">My Books</a></li>
            <li><a href="">Community</a></li>
            <li><a href="">Profile</a></li>
            <li>
                <form class="search-bar">
                    <input type="text" placeholder="Search titles, authors..." name="search">
                </form>
            </li>
            <li ><img src="" alt=""></li>
    </nav>
    <div class="start">
        <h2>Achievements & Badges</h2>
        <p>Track your literary milestones and unlock exclusive rewards as you explore the world of books.</p>
        <button class="btn-share">📤 Share Profile</button>
        <button class="btn-leader">📊 Viewn Leaderboard</button>
    </div>
    <div class="unlocked">
        <h4>TOTAL UNLOCKED</h4>
    </div>
    <div class="rank">
        <h4>GLOBAL RANK</h4>
    </div>
    <div class="milestone">
        <h4>NEXT MILESTONE</h4>
    </div>
    <div class="streaks">
        <h3>Reading Streaks</h3>
    </div>
    <hr>
    <div class="genre">
        <h3>Genre Master</h3>
    </div>
    <hr>
    <div class="community">
        <h3>Community Contributer</h3>
        <button class="btn-review">First Review</button>
        <button class="btn-chatter">Chatterbox</button>
        <button class="btn-inf">Influencer</button>
        <button class="btn-sharer">Sharer</button>
        <button class="btn-curator">Curator</button>
        <button class="btn-mentor">Mentor</button>
    </div>
</body>

</html>
